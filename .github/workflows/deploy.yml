name: QuizBlitz Production Deployment

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/quizblitz-backend:latest 

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/quizblitz-backend:latest
            
            docker stop quizblitz || true
            docker rm quizblitz || true
            docker image prune -f
            
            docker run -d --name quizblitz \
              -p 3000:3000 \
              -e PORT=3000 \
              -e MONGODB_URI="${{ secrets.MONGODB_URI }}" \
              -e GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e AWS_S3_BUCKET="quizblitz-storage-2026" \
              ${{ secrets.DOCKER_USERNAME }}/quizblitz-backend:latest